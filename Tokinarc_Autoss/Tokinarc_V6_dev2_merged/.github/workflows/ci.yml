# Tokinarc V6.B — .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Ruff (backend)
        run: |
          pip install ruff==0.4.7
          ruff check backend/
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: ESLint + typecheck (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tokinarc_test
          POSTGRES_USER: tokinarc
          POSTGRES_PASSWORD: tokinarc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tokinarc"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: tokinarc.settings.dev
      PGHOST: localhost
      PGDATABASE: tokinarc_test
      PGUSER: tokinarc
      PGPASSWORD: tokinarc
      REDIS_URL_CACHE: redis://localhost:6379/0
      REDIS_URL_RATELIMIT: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Check migrations drift
        working-directory: backend
        # Chặn lệch model ↔ migration (kể cả regression vendor-guard ở
        # catalog.PartEmbedding). Nếu đỏ: chạy `makemigrations` ở local rồi commit.
        run: python manage.py makemigrations --check --dry-run
      # NOTE (merge chatbot thật): bước "Check role tables sync" cũ đã BỎ.
      # Chatbot thật (v8.0) dùng X-API-Key + retrieval tự chứa, KHÔNG còn
      # roles_generated.py nên không cần đồng bộ roles.py → chatbot nữa.
      # Phân quyền role vẫn là single-source ở backend/apps/accounts/roles.py
      # cho phía Django (CRM/WMS/CEO).
      - name: Migrate + test
        working-directory: backend
        run: |
          python manage.py migrate
          pytest --cov=apps --cov-report=term-missing --cov-fail-under=0

  test-frontend:
    runs-on: ubuntu-latest
    # FE chưa code — job skip để CI không đỏ. Khi FE sẵn sàng: bỏ if dưới.
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: E2E
        working-directory: frontend
        run: npm run test:e2e
        # NOTE: E2E cần backend+sidecar — dùng docker-compose test hoặc mock API.

  build-images:
    needs: [lint, test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push django
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/django:${{ github.sha }}
      - name: Build & push chatbot
        # Chatbot thật v8.0: image nặng hơn (torch + sentence-transformers +
        # faiss) và bundle data/+indexes/. Build lâu hơn django/frontend.
        # Model bge-m3 KHÔNG tải lúc build — tải runtime, cache qua volume.
        uses: docker/build-push-action@v5
        with:
          context: ./chatbot
          push: true
          tags: ghcr.io/${{ github.repository }}/chatbot:${{ github.sha }}
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
