# Tokinarc V6 — Internal gateway (app.tokinarc.vn) — sau VPN, toàn bộ API
# Xem chi tiết: docs/architecture/Tokinarc_V6_B1_Stack_Topology.md §1.3
server {
    listen 10.0.0.10:443 ssl;   # bind interface nội bộ — chỉ truy cập qua WireGuard
    server_name app.tokinarc.vn;
    ssl_certificate     /etc/letsencrypt/live/app.tokinarc.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.tokinarc.vn/privkey.pem;

    location /api/chat/ {
        proxy_pass http://chatbot:8080/api/v2/;
        proxy_buffering off; proxy_read_timeout 300s;
    }
    location /ws/chat {
        proxy_pass http://chatbot:8080/ws/query;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /api/ { proxy_pass http://django:8000; }
    location /    { root /var/www/frontend; try_files $uri $uri/ /index.html; }
}
